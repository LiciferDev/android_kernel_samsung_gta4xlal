name: "Build NetHunter Kernel gta4xl"

on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev zstd wget libfl-dev python3 libarchive-tools jq

      - name: "🌟 Clone Source & Toolchain"
        run: |
          # Вытаскиваем инфу из repos.json
          REPO=$(jq -r '.kernelSource.repo' repos.json)
          BRANCH=$(jq -r '.kernelSource.branch' repos.json)
          
          # Клонируем исходники ядра в папку source
          git clone --depth=1 -b $BRANCH $REPO source
          
          # Клонируем тулчейн (компилятор)
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 toolchain
          
          # Прописываем путь к компилятору в систему
          echo "$(pwd)/toolchain/bin" >> $GITHUB_PATH

      - name: "👍 Make defconfig"
        run: |
          cd source
          # Генерируем базовый конфиг во внешнюю папку out
          make O=../out ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- gta4xl_defconfig

      - name: "🏴‍☠️ NetHunter Wireless Patch"
        run: |
          # Вносим правки прямо в файл .config перед сборкой
          cd out
          echo "Applying wireless patches for Atheros AR9271..."
          
          echo "CONFIG_WIRELESS=y" >> .config
          echo "CONFIG_CFG80211=y" >> .config
          echo "CONFIG_MAC80211=y" >> .config
          echo "CONFIG_CFG80211_WEXT=y" >> .config
          
          # Драйверы Atheros (Твой свисток)
          echo "CONFIG_ATH_COMMON=y" >> .config
          echo "CONFIG_ATH9K_HW=y" >> .config
          echo "CONFIG_ATH9K_COMMON=y" >> .config
          echo "CONFIG_ATH9K_HTC=y" >> .config
          
          # Драйверы Ralink (RT3070 и др.)
          echo "CONFIG_RT2X00=y" >> .config
          echo "CONFIG_RT2800USB=y" >> .config
          
          echo "Patching complete."

      - name: "🎶 Build kernel"
        run: |
          cd source
          # Запуск компиляции на всех ядрах процессора
          make -j$(nproc --all) O=../out ARCH=arm64 CROSS_COMPILE=aarch64-linux-android-

      - name: "💙 Upload Image.gz"
        uses: actions/upload-artifact@v4
        with:
          name: NetHunter-Kernel-gta4xl
          path: out/arch/arm64/boot/Image.gz
