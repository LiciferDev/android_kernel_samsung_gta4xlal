name: "Build NetHunter Kernel - gta4xl"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4
      - name: "Print repos.json"
        run: cat ${{ env.CONFIGURATION }}
      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos=$(jq -c . < ${{ env.CONFIGURATION }})" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: ${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}
      kernelName: ${{ matrix.repos.kernelSource.name }}
      kernelRepo: ${{ matrix.repos.kernelSource.repo }}
      kernelBranch: ${{ matrix.repos.kernelSource.branch }}
      kernelDevice: ${{ matrix.repos.kernelSource.device }}
      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.device }}_defconfig
      withKernelSU: ${{ matrix.repos.withKernelSU }}

    steps:
      - name: "✨ Create working dir"
        run: mkdir -p ${{ env.kernelDir }}

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip ftp \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev \
            lftp zstd wget libfl-dev python3 libarchive-tools jq

      - name: "🌟 Clone kernel source"
        working-directory: ./${{ env.kernelDir }}
        run: |
          git clone --recursive --branch ${{ env.kernelBranch }} ${{ env.kernelRepo }} ${{ env.kernelName }} --depth=1

      - name: "💫 Get toolchains"
        working-directory: ./${{ env.kernelDir }}
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num="$(echo $toolchains | jq 'length')"
          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo $toolchains | jq -r ".[$i].name")
            repo=$(echo $toolchains | jq -r ".[$i].repo")
            branch=$(echo $toolchains | jq -r ".[$i].branch")
            git clone --recursive --branch $branch $repo $name --depth=1
            echo "$(pwd)/$name/" >> $GITHUB_PATH
            echo "$(pwd)/$name/bin" >> $GITHUB_PATH
          done

      - name: "😎 Set args"
        id: generate-args
        working-directory: ./${{ env.kernelDir }}
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
          extraParams: "${{ toJSON(matrix.repos.extraParams) }}"
        run: |
          ARCH=$(echo $params | jq -r ".ARCH")
          CROSS_COMPILE=$(echo $params | jq -r ".CROSS_COMPILE")
          CROSS_COMPILE_COMPAT=$(echo $params | jq -r ".CROSS_COMPILE_COMPAT")
          CROSS_COMPILE_ARM32=$(echo $params | jq -r ".CROSS_COMPILE_ARM32")
          CLANG_TRIPLE=$(echo $params | jq -r ".CLANG_TRIPLE")
          AR=$(echo $params | jq -r ".AR")
          CC=$(echo $params | jq -r ".CC")

          echo "ARCH=$ARCH" >> $GITHUB_ENV

          args="-j$(nproc --all)"
          if [ -n "$OUT_DIR" ]; then
            mkdir -p "$(pwd)/$OUT_DIR"
            args="$args O=$(pwd)/$OUT_DIR"
          fi
          [ -n "$ARCH" ] && args="$args ARCH=$ARCH"
          [ -n "$CROSS_COMPILE" ] && args="$args CROSS_COMPILE=$CROSS_COMPILE"
          [ -n "$CLANG_TRIPLE" ] && args="$args CLANG_TRIPLE=$CLANG_TRIPLE"
          [ -n "$CROSS_COMPILE_COMPAT" ] && args="$args CROSS_COMPILE_ARM32=$CROSS_COMPILE_COMPAT"
          [ -n "$CROSS_COMPILE_ARM32" ] && args="$args CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32"
          [ -n "$AR" ] && args="$args AR=$AR"
          [ -n "$CC" ] && args="$args CC=$CC"

          extra_params=$(echo $extraParams | jq -r ' to_entries[] | select(.value != "") | "\(.key)=\(.value)"' | tr "\n" " " | sed 's/ $//')
          echo "args=$args $extra_params" >> $GITHUB_OUTPUT

      - name: "😋 Update KernelSU"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        if: ${{ env.withKernelSU == 'true' }}
        run: |
          if [ -d "./KernelSU" ]; then
            rm -rf "./KernelSU"
          fi
          if [ -d "./drivers/kernelsu" ]; then
            rm -rf "./drivers/kernelsu"
          fi
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

          echo -e "\nCONFIG_KPROBES=y" >> ./arch/${{ env.ARCH }}/configs/${{ env.DEFCONFIG_NAME }}
          echo -e "\nCONFIG_HAVE_KPROBES=y" >> ./arch/${{ env.ARCH }}/configs/${{ env.DEFCONFIG_NAME }}
          echo -e "\nCONFIG_KPROBE_EVENTS=y" >> ./arch/${{ env.ARCH }}/configs/${{ env.DEFCONFIG_NAME }}

      - name: "🛠️ Make defconfig"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          make ${{ env.args }} ${{ env.DEFCONFIG_NAME }}

      - name: "🏴‍☠️ Full NetHunter Configuration"
        working-directory: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          echo "=== Applying NetHunter feature set ==="

          # Маркер ядра, чтобы NetHunter видел его как кастомное
          echo "CONFIG_LOCALVERSION=\"-NetHunter\"" >> .config
          grep -q "CONFIG_LOCALVERSION_AUTO=y" .config && \
            sed -i 's/CONFIG_LOCALVERSION_AUTO=y/# CONFIG_LOCALVERSION_AUTO is not set/' .config || \
            echo "# CONFIG_LOCALVERSION_AUTO is not set" >> .config

          # /proc/config.gz
          echo "CONFIG_IKCONFIG=y" >> .config
          echo "CONFIG_IKCONFIG_PROC=y" >> .config

          # Стек протектора
          echo "CONFIG_CC_STACKPROTECTOR_NONE=y" >> .config
          sed -i 's/CONFIG_CC_STACKPROTECTOR_STRONG=y/# CONFIG_CC_STACKPROTECTOR_STRONG is not set/g' .config

          # Wi-Fi мониторинг + драйверы (ровно как в рабочем варианте)
          echo "CONFIG_WIRELESS=y" >> .config
          echo "CONFIG_CFG80211=y" >> .config
          echo "CONFIG_MAC80211=y" >> .config
          echo "CONFIG_CFG80211_WEXT=y" >> .config
          echo "CONFIG_MAC80211_RC_DEFAULT_MINSTREL=y" >> .config
          echo "CONFIG_MAC80211_MESH=y" >> .config
          echo "CONFIG_CFG80211_DEBUGFS=y" >> .config
          echo "CONFIG_MAC80211_DEBUGFS=y" >> .config

          echo "CONFIG_ATH_COMMON=y" >> .config
          echo "CONFIG_ATH9K_HTC=y" >> .config
          echo "CONFIG_CARL9170=y" >> .config
          echo "CONFIG_RT2X00=y" >> .config
          echo "CONFIG_RT2800USB=y" >> .config
          echo "CONFIG_RT2800USB_RT53XX=y" >> .config
          echo "CONFIG_RT2800USB_UNKNOWN=y" >> .config
          echo "CONFIG_RTL8187=y" >> .config
          echo "CONFIG_RTL8192CU=y" >> .config
          echo "CONFIG_RTL8XXXU=y" >> .config
          echo "CONFIG_RTL8192EU=y" >> .config
          echo "CONFIG_ZD1211RW=y" >> .config
          echo "CONFIG_MT76x2U=y" >> .config
          echo "CONFIG_MT76x2U_DEBUGFS=y" >> .config

          # Bluetooth (базовый, без UHID/HIDRAW/LE, которые могут тянуть лишнее)
          echo "CONFIG_BT=y" >> .config
          echo "CONFIG_BT_RFCOMM=y" >> .config
          echo "CONFIG_BT_HIDP=y" >> .config
          echo "CONFIG_BT_HCIBTUSB=y" >> .config

          # BadUSB / USB Gadget HID (работало)
          echo "CONFIG_USB_GADGET=y" >> .config
          echo "CONFIG_USB_CONFIGFS=y" >> .config
          echo "CONFIG_USB_CONFIGFS_F_HID=y" >> .config
          echo "CONFIG_USB_G_HID=y" >> .config
          echo "CONFIG_USB_G_ANDROID=y" >> .config
          echo "CONFIG_OF_CONFIGFS=y" >> .config
          echo "CONFIG_OF_OVERLAY=y" >> .config

          # Сетевые инструменты
          echo "CONFIG_BRIDGE=y" >> .config
          echo "CONFIG_VETH=y" >> .config
          echo "CONFIG_TUN=y" >> .config
          echo "CONFIG_NETFILTER=y" >> .config
          echo "CONFIG_NF_CONNTRACK=y" >> .config
          echo "CONFIG_IP_NF_IPTABLES=y" >> .config
          echo "CONFIG_NETFILTER_XT_MATCH_STATE=y" >> .config

          # Файловые системы
          echo "CONFIG_EXT4_FS=y" >> .config
          echo "CONFIG_VFAT_FS=y" >> .config
          echo "CONFIG_EXFAT_FS=y" >> .config
          echo "CONFIG_NTFS_FS=y" >> .config
          echo "CONFIG_OVERLAY_FS=y" >> .config

          # BPF
          echo "CONFIG_BPF=y" >> .config
          echo "CONFIG_BPF_SYSCALL=y" >> .config

          # Применяем зависимости
          cd ../${{ env.kernelName }}
          make ${{ env.args }} olddefconfig

      - name: "🎶 Build kernel"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          make ${args} KCFLAGS="-Wno-error" KBUILD_BUILD_USER="Nursultan | TG: @Licifer_Exe" KBUILD_BUILD_HOST="NetHunter"

      - name: "💛 Upload Image"
        uses: actions/upload-artifact@v4
        with:
          name: Image(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/Image
          if-no-files-found: ignore
          retention-days: 7

      - name: "💙 Upload Image.gz"
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/Image.gz
          if-no-files-found: ignore
          retention-days: 7

      - name: "💜 Upload dtb"
        uses: actions/upload-artifact@v4
        with:
          name: dtb(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/dtb
          if-no-files-found: ignore
          retention-days: 7

      - name: "❤️ Upload dtbo.img"
        uses: actions/upload-artifact@v4
        with:
          name: dtbo.img(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/dtbo.img
          if-no-files-found: ignore
          retention-days: 7
