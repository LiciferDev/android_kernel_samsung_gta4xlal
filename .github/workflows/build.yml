name: "Build NetHunter Kernel - gta4xl (Stable)"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4

      - name: "Print repos.json"
        run: cat ${{ env.CONFIGURATION }}

      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos=$(jq -c . < ${{ env.CONFIGURATION }})" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs: Set-repos
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}

    env:
      kernelName: ${{ matrix.repos.kernelSource.name }}
      kernelRepo: ${{ matrix.repos.kernelSource.repo }}
      kernelBranch: ${{ matrix.repos.kernelSource.branch }}
      kernelDevice: ${{ matrix.repos.kernelSource.device }}
      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.device }}_defconfig
      withKernelSU: ${{ matrix.repos.withKernelSU }}

    steps:
      - name: "✨ Create working directory"
        id: create-dir
        run: |
          KERNEL_DIR="${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}"
          echo "kernelDir=$KERNEL_DIR" >> $GITHUB_ENV
          mkdir -p "$KERNEL_DIR"
          OUT_DIR_ABS="$PWD/$KERNEL_DIR/out"
          echo "OUT_DIR_ABS=$OUT_DIR_ABS" >> $GITHUB_ENV
          mkdir -p "$OUT_DIR_ABS"
          echo "Working directory: $KERNEL_DIR"
          echo "Output directory: $OUT_DIR_ABS"

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc curl git zip unzip ftp \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            libssl-dev lftp zstd wget libfl-dev python3 \
            libarchive-tools jq ccache bison flex

      - name: "🌟 Clone kernel source"
        working-directory: ${{ env.kernelDir }}
        run: |
          git clone --recursive --branch ${{ env.kernelBranch }} \
            ${{ env.kernelRepo }} ${{ env.kernelName }} --depth=1

      - name: "💫 Get toolchains"
        working-directory: ${{ env.kernelDir }}
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num="$(echo $toolchains | jq 'length')"
          for ((i=0; i<toolchains_num; i++)); do
            name=$(echo $toolchains | jq -r ".[$i].name")
            repo=$(echo $toolchains | jq -r ".[$i].repo")
            branch=$(echo $toolchains | jq -r ".[$i].branch")
            git clone --recursive --branch "$branch" "$repo" "$name" --depth=1
            echo "$(pwd)/$name/bin" >> $GITHUB_PATH
          done

      - name: "😎 Set build args"
        id: generate-args
        working-directory: ${{ env.kernelDir }}
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
          extraParams: "${{ toJSON(matrix.repos.extraParams) }}"
          OUT_DIR_ABS: ${{ env.OUT_DIR_ABS }}
        run: |
          ARCH=$(echo $params | jq -r ".ARCH")
          CROSS_COMPILE=$(echo $params | jq -r ".CROSS_COMPILE")
          CROSS_COMPILE_COMPAT=$(echo $params | jq -r ".CROSS_COMPILE_COMPAT")
          CROSS_COMPILE_ARM32=$(echo $params | jq -r ".CROSS_COMPILE_ARM32")
          CLANG_TRIPLE=$(echo $params | jq -r ".CLANG_TRIPLE")
          AR=$(echo $params | jq -r ".AR")
          CC=$(echo $params | jq -r ".CC")
          echo "ARCH=$ARCH" >> $GITHUB_ENV
          args="-j$(nproc --all) O=$OUT_DIR_ABS"
          [ -n "$ARCH" ] && args="$args ARCH=$ARCH"
          [ -n "$CROSS_COMPILE" ] && args="$args CROSS_COMPILE=$CROSS_COMPILE"
          [ -n "$CLANG_TRIPLE" ] && args="$args CLANG_TRIPLE=$CLANG_TRIPLE"
          [ -n "$CROSS_COMPILE_COMPAT" ] && args="$args CROSS_COMPILE_COMPAT=$CROSS_COMPILE_COMPAT"
          [ -n "$CROSS_COMPILE_ARM32" ] && args="$args CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32"
          [ -n "$AR" ] && args="$args AR=$AR"
          [ -n "$CC" ] && args="$args CC=$CC"
          extra_params=$(echo $extraParams | jq -r 'to_entries[] | select(.value != "") | "\(.key)=\(.value)"' | tr "\n" " " | sed 's/ $//')
          echo "args=$args $extra_params" >> $GITHUB_OUTPUT

      - name: "😋 Update KernelSU"
        working-directory: ${{ env.kernelDir }}/${{ env.kernelName }}
        if: ${{ env.withKernelSU == 'true' }}
        run: |
          rm -rf ./KernelSU ./drivers/kernelsu 2>/dev/null || true
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
          cat >> ./arch/${{ env.ARCH }}/configs/${{ env.DEFCONFIG_NAME }} << EOF
          # KernelSU requirements
          CONFIG_KPROBES=y
          CONFIG_HAVE_KPROBES=y
          CONFIG_KPROBE_EVENTS=y
          EOF

      - name: "🛠️ Make defconfig"
        working-directory: ${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          ARGS: ${{ steps.generate-args.outputs.args }}
          OUT_DIR_ABS: ${{ env.OUT_DIR_ABS }}
        run: |
          make $ARGS ${{ env.DEFCONFIG_NAME }}

      - name: "🏴‍☠️ Full NetHunter Configuration (merge)"
        working-directory: ${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          ARGS: ${{ steps.generate-args.outputs.args }}
          OUT_DIR_ABS: ${{ env.OUT_DIR_ABS }}
        run: |
          echo "=== Creating NetHunter fragment ==="
          cat > nethunter_fragment.config << 'EOF'
          # Kernel marker for NetHunter detection
          CONFIG_LOCALVERSION="-NetHunter"
          # CONFIG_LOCALVERSION_AUTO is not set

          # /proc/config.gz support
          CONFIG_IKCONFIG=y
          CONFIG_IKCONFIG_PROC=y

          # Disable stack protector for injections
          CONFIG_CC_STACKPROTECTOR_NONE=y
          # CONFIG_CC_STACKPROTECTOR_STRONG is not set

          # Wireless / WiFi monitor mode + injection
          CONFIG_WIRELESS=y
          CONFIG_CFG80211=y
          CONFIG_MAC80211=y
          CONFIG_CFG80211_WEXT=y
          CONFIG_MAC80211_RC_DEFAULT_MINSTREL=y
          CONFIG_MAC80211_MESH=y
          CONFIG_CFG80211_DEBUGFS=y
          CONFIG_MAC80211_DEBUGFS=y

          # USB WiFi drivers (monitor + injection capable)
          CONFIG_WLAN_VENDOR_ATH=y
          CONFIG_ATH_COMMON=y
          CONFIG_ATH9K_HTC=y
          CONFIG_CARL9170=y

          CONFIG_WLAN_VENDOR_RALINK=y
          CONFIG_RT2X00=y
          CONFIG_RT2800USB=y
          CONFIG_RT2800USB_RT33XX=y
          CONFIG_RT2800USB_RT35XX=y
          CONFIG_RT2800USB_RT53XX=y
          CONFIG_RT2800USB_RT55XX=y
          CONFIG_RT2800USB_UNKNOWN=y
          CONFIG_MT7601U=y

          CONFIG_WLAN_VENDOR_REALTEK=y
          CONFIG_RTL_CARDS=y
          CONFIG_RTL8187=y
          CONFIG_RTL8192CU=y
          CONFIG_RTL8XXXU=y
          CONFIG_RTL8192EU=y

          CONFIG_WLAN_VENDOR_ZYDAS=y
          CONFIG_ZD1211RW=y

          CONFIG_USB_NET_RNDIS_WLAN=y

          # Bluetooth (full stack)
          CONFIG_BT=y
          CONFIG_BT_RFCOMM=y
          CONFIG_BT_RFCOMM_TTY=y
          CONFIG_BT_HIDP=y
          CONFIG_BT_HCIBTUSB=y
          CONFIG_BT_LE=y
          CONFIG_UHID=y
          CONFIG_HIDRAW=y

          # BadUSB / USB Gadget HID
          CONFIG_USB_GADGET=y
          CONFIG_USB_CONFIGFS=y
          CONFIG_USB_CONFIGFS_F_HID=y
          CONFIG_USB_G_HID=y
          CONFIG_USB_G_ANDROID=y
          CONFIG_USB_CONFIGFS_RNDIS=y
          CONFIG_USB_CONFIGFS_SERIAL=y
          CONFIG_USB_CONFIGFS_ACM=y
          CONFIG_USB_CONFIGFS_OBEX=y
          CONFIG_USB_CONFIGFS_NCM=y
          CONFIG_USB_CONFIGFS_ECM=y
          CONFIG_USB_CONFIGFS_ECM_SUBSET=y
          CONFIG_USB_CONFIGFS_EEM=y
          CONFIG_USB_CONFIGFS_MASS_STORAGE=y

          # RNDIS / Tethering utilities
          CONFIG_USB_ETH=y
          CONFIG_OF_CONFIGFS=y
          CONFIG_OF_OVERLAY=y

          # Networking (bridge, NAT, TUN)
          CONFIG_BRIDGE=y
          CONFIG_VETH=y
          CONFIG_TUN=y
          CONFIG_NETFILTER=y
          CONFIG_NF_CONNTRACK=y
          CONFIG_IP_NF_IPTABLES=y
          CONFIG_NETFILTER_XT_MATCH_STATE=y

          # Filesystem support (exFAT, NTFS, etc.)
          CONFIG_EXT4_FS=y
          CONFIG_VFAT_FS=y
          CONFIG_EXFAT_FS=y
          CONFIG_NTFS_FS=y
          CONFIG_OVERLAY_FS=y

          # BPF for tools
          CONFIG_BPF=y
          CONFIG_BPF_SYSCALL=y
          EOF

          echo "=== Merging fragment ==="
          ./scripts/kconfig/merge_config.sh -m -r $OUT_DIR_ABS/.config nethunter_fragment.config
          make $ARGS olddefconfig

      - name: "🎶 Build kernel"
        working-directory: ${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          ARGS: ${{ steps.generate-args.outputs.args }}
        run: |
          make $ARGS KCFLAGS="-Wno-error" \
            KBUILD_BUILD_USER="Nursultan | TG: @Licifer_Exe" \
            KBUILD_BUILD_HOST="NetHunter"

      # ==================== Upload Artifacts ====================
      - name: "📄 Upload kernel config"
        uses: actions/upload-artifact@v4
        with:
          name: config(${{ env.kernelDevice }}-${{ env.kernelName }})
          path: ${{ env.OUT_DIR_ABS }}/.config
          if-no-files-found: ignore
          retention-days: 7

      - name: "💛 Upload Image"
        uses: actions/upload-artifact@v4
        with:
          name: Image(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ${{ env.OUT_DIR_ABS }}/arch/${{ env.ARCH }}/boot/Image
          if-no-files-found: ignore
          retention-days: 7

      - name: "💙 Upload Image.gz"
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ${{ env.OUT_DIR_ABS }}/arch/${{ env.ARCH }}/boot/Image.gz
          if-no-files-found: ignore
          retention-days: 7

      - name: "💜 Upload dtb"
        uses: actions/upload-artifact@v4
        with:
          name: dtb(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ${{ env.OUT_DIR_ABS }}/arch/${{ env.ARCH }}/boot/dtb
          if-no-files-found: ignore
          retention-days: 7

      - name: "❤️ Upload dtbo.img"
        uses: actions/upload-artifact@v4
        with:
          name: dtbo.img(${{ env.kernelDevice }}-${{ env.kernelName }}-${{ env.kernelBranch }})
          path: ${{ env.OUT_DIR_ABS }}/arch/${{ env.ARCH }}/boot/dtbo.img
          if-no-files-found: ignore
          retention-days: 7
