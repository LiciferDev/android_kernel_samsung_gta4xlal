name: "Build NetHunter Kernel - gta4xl"

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

on:
  workflow_dispatch:

jobs:
  Set-repos:
    name: "🐂 Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
    steps:
      - name: "😄 Checkout"
        uses: actions/checkout@v4
      - name: "Print repos.json"
        run: cat ${{ env.CONFIGURATION }}
      - name: "😆 Generate Matrix"
        id: generate-matrix
        run: |
          echo "repos=$(jq -c . < ${{ env.CONFIGURATION }})" >> $GITHUB_OUTPUT

  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest
    needs:
      - Set-repos
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}
    env:
      kernelDir: ${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}
      kernelName: ${{ matrix.repos.kernelSource.name }}
      kernelRepo: ${{ matrix.repos.kernelSource.repo }}
      kernelBranch: ${{ matrix.repos.kernelSource.branch }}
      kernelDevice: ${{ matrix.repos.kernelSource.device }}
      # defconfig по умолчанию строится как <device>_defconfig
      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.defconfig || format('{0}_defconfig', matrix.repos.kernelSource.device) }}
      withKernelSU: ${{ matrix.repos.withKernelSU }}

    steps:
      - name: "✨ Create working dir"
        run: mkdir -p ${{ env.kernelDir }}

      - name: "⭐ Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev \
            lftp zstd wget libfl-dev python3 libarchive-tools jq

      - name: "🌟 Clone kernel source"
        working-directory: ./${{ env.kernelDir }}
        run: |
          git clone --recursive --branch ${{ env.kernelBranch }} ${{ env.kernelRepo }} ${{ env.kernelName }} --depth=1

      - name: "💫 Get toolchains"
        working-directory: ./${{ env.kernelDir }}
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          toolchains_num="$(echo $toolchains | jq 'length')"
          for ((i=0;i<toolchains_num;i++)); do
            name=$(echo $toolchains | jq -r ".[$i].name")
            repo=$(echo $toolchains | jq -r ".[$i].repo")
            branch=$(echo $toolchains | jq -r ".[$i].branch")
            git clone --recursive --branch $branch $repo $name --depth=1
            echo "$(pwd)/$name/bin" >> $GITHUB_PATH
          done

      - name: "😎 Set build arguments"
        id: generate-args
        working-directory: ./${{ env.kernelDir }}
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
        run: |
          ARCH=$(echo $params | jq -r ".ARCH")
          CROSS_COMPILE=$(echo $params | jq -r ".CROSS_COMPILE")
          CROSS_COMPILE_ARM32=$(echo $params | jq -r ".CROSS_COMPILE_ARM32 // empty")
          CLANG_TRIPLE=$(echo $params | jq -r ".CLANG_TRIPLE // empty")
          CC=$(echo $params | jq -r ".CC // empty")

          echo "ARCH=$ARCH" >> $GITHUB_ENV
          echo "CROSS_COMPILE=$CROSS_COMPILE" >> $GITHUB_ENV
          echo "CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32" >> $GITHUB_ENV
          echo "CLANG_TRIPLE=$CLANG_TRIPLE" >> $GITHUB_ENV
          echo "CC=$CC" >> $GITHUB_ENV

          args="-j$(nproc --all) ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE"
          [ -n "$CROSS_COMPILE_ARM32" ] && args="$args CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32"
          [ -n "$CLANG_TRIPLE" ] && args="$args CLANG_TRIPLE=$CLANG_TRIPLE"
          [ -n "$CC" ] && args="$args CC=$CC"

          if [ -n "$OUT_DIR" ]; then
            mkdir -p "$(pwd)/$OUT_DIR"
            args="$args O=$(pwd)/$OUT_DIR"
          fi
          echo "args=$args" >> $GITHUB_OUTPUT

      - name: "😋 Update KernelSU"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        if: ${{ env.withKernelSU == 'true' }}
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

      - name: "🛠️ Make defconfig"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          echo "⚙️  Using defconfig: ${{ env.DEFCONFIG_NAME }}"
          make ${{ env.args }} ${{ env.DEFCONFIG_NAME }}

      - name: "🏴‍☠️ Full NetHunter Configuration"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          echo "Applying full NetHunter feature set..."

          # 1. Стековый протектор (отключаем strong, включаем none)
          scripts/config --disable CONFIG_CC_STACKPROTECTOR_STRONG || true
          scripts/config --enable CONFIG_CC_STACKPROTECTOR_NONE   || true

          # 2. Беспроводная сеть и мониторный режим
          scripts/config --enable CONFIG_WIRELESS
          scripts/config --enable CONFIG_CFG80211
          scripts/config --enable CONFIG_MAC80211
          scripts/config --enable CONFIG_CFG80211_WEXT
          scripts/config --enable CONFIG_MAC80211_RC_DEFAULT_MINSTREL
          scripts/config --enable CONFIG_MAC80211_MESH
          scripts/config --enable CONFIG_CFG80211_DEBUGFS
          scripts/config --enable CONFIG_MAC80211_DEBUGFS

          # 3. USB Wi-Fi адаптеры
          scripts/config --enable CONFIG_ATH_COMMON
          scripts/config --enable CONFIG_ATH9K_HTC
          scripts/config --enable CONFIG_CARL9170

          scripts/config --enable CONFIG_RT2X00
          scripts/config --enable CONFIG_RT2800USB
          scripts/config --enable CONFIG_RT2800USB_RT53XX
          scripts/config --enable CONFIG_RT2800USB_UNKNOWN

          scripts/config --enable CONFIG_RTL8187
          scripts/config --enable CONFIG_RTL8192CU
          scripts/config --enable CONFIG_RTL8XXXU
          scripts/config --enable CONFIG_RTL8192EU

          scripts/config --enable CONFIG_ZD1211RW

          scripts/config --enable CONFIG_MT76x2U
          scripts/config --enable CONFIG_MT76x2U_DEBUGFS

          # 4. USB Gadgets (BadUSB/HID)
          scripts/config --enable CONFIG_USB_GADGET
          scripts/config --enable CONFIG_USB_CONFIGFS
          scripts/config --enable CONFIG_USB_CONFIGFS_F_HID
          scripts/config --enable CONFIG_USB_G_HID

          # 5. Сетевые утилиты
          scripts/config --enable CONFIG_BRIDGE
          scripts/config --enable CONFIG_VETH
          scripts/config --enable CONFIG_TUN
          scripts/config --enable CONFIG_NETFILTER
          scripts/config --enable CONFIG_NF_CONNTRACK
          scripts/config --enable CONFIG_IP_NF_IPTABLES
          scripts/config --enable CONFIG_NETFILTER_XT_MATCH_STATE

          # 6. Файловые системы
          scripts/config --enable CONFIG_EXT4_FS
          scripts/config --enable CONFIG_VFAT_FS
          scripts/config --enable CONFIG_EXFAT_FS
          scripts/config --enable CONFIG_NTFS_FS
          scripts/config --enable CONFIG_OVERLAY_FS

          # 7. BPF (для последних версий Kali)
          scripts/config --enable CONFIG_BPF
          scripts/config --enable CONFIG_BPF_SYSCALL

          # Обновить .config и разрешить зависимости
          make ${{ env.args }} olddefconfig

      - name: "🎶 Build kernel"
        working-directory: ./${{ env.kernelDir }}/${{ env.kernelName }}
        env:
          args: ${{ steps.generate-args.outputs.args }}
        run: |
          make ${{ env.args }} KCFLAGS="-Wno-error" KBUILD_BUILD_USER="Nursultan" KBUILD_BUILD_HOST="NetHunter"

      - name: "💙 Upload Image.gz"
        uses: actions/upload-artifact@v4
        with:
          name: NetHunter-Kernel-${{ env.kernelDevice }}
          path: ./${{ env.kernelDir }}/${{ env.OUT_DIR }}/arch/${{ env.ARCH }}/boot/Image.gz
          if-no-files-found: ignore
